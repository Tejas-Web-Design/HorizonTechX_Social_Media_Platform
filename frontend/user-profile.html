<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>🌐 User Profile | SocialConnect</title>

    <link rel="stylesheet" href="css/user-profile.css">

</head>

<body>

<div class="bg-blur blur-1"></div>

<div class="bg-blur blur-2"></div>

<nav class="navbar">

    <div class="logo">

        🌐 SocialConnect

    </div>

    <div class="nav-links">

        <button onclick="location.href='home.html'">

            🏠 Home

        </button>

        <button onclick="location.href='users.html'">

            👥 People

        </button>

        <button onclick="history.back()">

            ← Back

        </button>

    </div>

</nav>

<div class="profile-page">

    <div class="profile-card">

        <div class="cover-photo"></div>

        <div class="profile-info">

            <div class="profile-avatar">

                <img

                    id="profileImage"

                    src="https://via.placeholder.com/150"

                    alt="User"

                >

            </div>

            <div class="profile-details">

                <h2>

                    User Profile

                </h2>

                <div id="userProfile">

                    Loading...

                </div>

            </div>

        </div>

        <div class="profile-stats">

            <div class="stat-card">

                <h3 id="userPosts">

                    0

                </h3>

                <p>

                    Posts

                </p>

            </div>

            <div class="stat-card">

                <h3 id="userFollowers">

                    0

                </h3>

                <p>

                    Followers

                </p>

            </div>

            <div class="stat-card">

                <h3 id="userFollowing">

                    0

                </h3>

                <p>

                    Following

                </p>

            </div>

        </div>

        <div class="profile-actions">

            <button id="followBtn">

                ❤️ Follow

            </button>

        </div>

    </div>

    <div class="profile-posts">

        <div class="section-title">

            <h2>

                📝 User Posts

            </h2>

            <p>

                Explore all posts shared by this user.

            </p>

        </div>

        <div id="userPostsContainer">

            <div class="loading-card">

                <div class="loader"></div>

                <p>

                    Loading posts...

                </p>

            </div>

        </div>

    </div>

</div>

<footer class="footer">

    <p>

        © 2026 SocialConnect • Connect • Share • Inspire ❤️

    </p>

</footer>

<script src="js/user-profile.js"></script>

</body>

</html>
