<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🌐Discover People | SocialConnect</title>

    <link rel="stylesheet" href="css/users.css">

</head>

<body>

<div class="bg-blur blur-1"></div>

<div class="bg-blur blur-2"></div>

<nav class="navbar">

    <div class="logo">

        🌐 SocialConnect

    </div>

    <div class="nav-links">

        <button onclick="location.href='home.html'">

            🏠 Home

        </button>

        <button onclick="location.href='profile.html'">

            👤 My Profile

        </button>

    </div>

</nav>

<div class="users-page">

    <div class="users-card">

        <div class="section-title">

            <h1>

                👥 Discover People

            </h1>

            <p>

                Connect with amazing people from the SocialConnect community.

            </p>

        </div>

        <div class="search-box">

            <input

                type="text"

                id="searchInput"

                placeholder="🔍 Search users by username..."

            >

        </div>

        <div id="usersList">

            <div class="loading-card">

                <div class="loader"></div>

                <p>

                    Loading users...

                </p>

            </div>

        </div>

    </div>

</div>

<footer class="footer">

    <p>

        © 2026 SocialConnect • Connect • Share • Inspire ❤️

    </p>

</footer>

<script src="js/users.js"></script>

</body>

</html>
