<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🌐 Profile | SocialConnect</title>

    <link rel="stylesheet" href="css/profile.css">

</head>

<body>

<div class="bg-blur blur-1"></div>

<div class="bg-blur blur-2"></div>

<nav class="navbar">

    <div class="logo">

        🌐 SocialConnect

    </div>

    <div class="nav-links">

        <button onclick="location.href='home.html'">

            🏠 Home

        </button>

        <button onclick="location.href='users.html'">

            👥 People

        </button>

    </div>

</nav>

<div class="profile-page">

    <div class="profile-card">

        <div class="cover-photo"></div>

        <div class="profile-info">

            <div class="profile-avatar">

                <img

                    id="profileImage"

                    src="https://via.placeholder.com/150"

                    alt="Profile"

                >

            </div>

            <div class="profile-details">

                <h2>

                    My Profile

                </h2>

                <div id="profileData">

                    Loading profile...

                </div>

            </div>

        </div>
                <div class="profile-stats">

            <div class="stat-card">

                <h3 id="postsCount">

                    0

                </h3>

                <p>

                    Posts

                </p>

            </div>

            <div class="stat-card">

                <h3 id="followersCount">

                    0

                </h3>

                <p>

                    Followers

                </p>

            </div>

            <div class="stat-card">

                <h3 id="followingCount">

                    0

                </h3>

                <p>

                    Following

                </p>

            </div>

        </div>

        <div class="profile-actions">

            <button id="editBtn">

                ✏️ Edit Profile

            </button>

            <button id="logoutBtn">

                🚪 Logout

            </button>
            

        </div>

    </div>

    <div class="profile-posts">

        <div class="section-title">

            <h2>

                📝 My Recent Posts

            </h2>

            <p>

                Your latest posts will appear here.

            </p>

        </div>

        <div id="recentPosts">

            <div class="loading-card">

                <div class="loader"></div>

                <p>

                    Loading your posts...

                </p>

            </div>

        </div>

    </div>

</div>

<footer class="footer">

    <p>

        © 2026 SocialConnect • Connect • Share • Inspire ❤️

    </p>

</footer>

<script src="js/profile.js"></script>

</body>

</html>
